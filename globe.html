<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html,body,#cesiumContainer{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#06080f;}
  .cesium-credit-logoContainer{display:none!important;}
  .cesium-credit-textContainer{display:none!important;}
</style>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
<div id="cesiumContainer"></div>
<script>
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWIwOS0wNzI2LTRmZjUtYmUxZS1jMzAwMGE5OGIzNzIiLCJpZCI6MjU5LCJpYXQiOjE1NjMzMTMwODZ9.oxU7gkpYaEF0WFNEG4JpHHDgVpnrlaVTMPnBxj7D05k';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: Cesium.createWorldTerrain(),
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  animation: false,
  timeline: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false,
  creditContainer: document.createElement('div'),
});

// Natural Earth / Blue Marble imagery
viewer.imageryLayers.removeAll();
viewer.imageryLayers.addImageryProvider(
  new Cesium.IonImageryProvider({ assetId: 3845 })
);

// Enable atmosphere
viewer.scene.skyAtmosphere.show = true;
viewer.scene.globe.enableLighting = false;
viewer.scene.skyBox = new Cesium.SkyBox({
  sources: {
    positiveX: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_px.jpg',
    negativeX: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_mx.jpg',
    positiveY: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_py.jpg',
    negativeY: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_my.jpg',
    positiveZ: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_pz.jpg',
    negativeZ: 'https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_mz.jpg',
  }
});

// Initial camera - globe view from space
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(10, 30, 22000000),
  orientation: {
    heading: 0,
    pitch: -Cesium.Math.PI_OVER_TWO,
    roll: 0
  }
});

// Helper: create red pin canvas
function createPinCanvas() {
  const canvas = document.createElement('canvas');
  canvas.width = 28; canvas.height = 28;
  const ctx = canvas.getContext('2d');
  // Shadow
  ctx.beginPath();
  ctx.arc(15, 15, 10, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  // Pin
  ctx.beginPath();
  ctx.arc(14, 14, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#e8533a';
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // Shine
  ctx.beginPath();
  ctx.arc(10, 10, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  return canvas;
}

const pinImage = createPinCanvas();

// Listen for spots from parent window
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'SET_SPOTS') {
    addPins(e.data.spots);
  }
  if (e.data && e.data.type === 'FLY_TO') {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(e.data.lng, e.data.lat, 1500000),
      duration: 2.5
    });
  }
});

function addPins(spots) {
  // Remove old pins
  viewer.entities.removeAll();
  
  spots.forEach(s => {
    if (!s.lat || !s.lng) return;
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(s.lng, s.lat, 0),
      billboard: {
        image: pinImage,
        verticalOrigin: Cesium.VerticalOrigin.CENTER,
        scale: 1.2,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
      label: {
        text: s.name,
        font: 'bold 13px Inter, sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.fromCssColorString('#1a2e3b'),
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -20),
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        show: true,
      }
    });
  });

  // Auto-fly to first spot if exists
  if (spots.length > 0 && spots[0].lat) {
    setTimeout(() => {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(spots[0].lng, spots[0].lat, 18000000),
        duration: 2
      });
    }, 1000);
  }
}

// Notify parent that globe is ready
window.parent.postMessage({ type: 'GLOBE_READY' }, '*');
</script>
</body>
</html>
